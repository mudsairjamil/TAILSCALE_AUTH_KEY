name: RDP-Kashmir-Final
on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Install Tailscale
        shell: powershell
        run: |
          curl.exe -LO https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe
          start-process -FilePath "tailscale-setup-latest.exe" -ArgumentList "/quiet" -Wait
          
      - name: Connect to Tailscale
        shell: powershell
        env:
          TS_AUTHKEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=$env:TS_AUTHKEY --hostname=kashmir-rdp
          
      - name: Create Clean User
        shell: powershell
        run: |
          net user Mudasir Jamil786 /add
          net localgroup administrators Mudasir /add
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
      - name: Keep Alive
        shell: powershell
        run: |
          Write-Host "RDP Active! Log in with User: Mudasir | Pass: Jamil786"
          while ($true) { Start-Sleep -Seconds 3600 }
